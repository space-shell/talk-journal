<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibbs</title>
  <style>
    /* Light-first — dark mode via prefers-color-scheme */
    :root {
      --bg:       #f9fafb;
      --surface:  #ffffff;
      --surface2: #f3f4f6;
      --border:   #e5e7eb;
      --text:     #111827;
      --muted:    #6b7280;
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --green:    #059669;
      --red:      #dc2626;
      --yellow:   #d97706;
      --r:        10px;
      --mono:     ui-monospace, 'Cascadia Code', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #0f1117;
        --surface:  #1a1d26;
        --surface2: #22263a;
        --border:   #2e3348;
        --text:     #e8eaf0;
        --muted:    #7a7f9a;
        --accent:   #4f7ef8;
        --accent-h: #6b94ff;
        --green:    #34d399;
        --red:      #f87171;
        --yellow:   #fbbf24;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 15px;
    }

    /* ── Compat warning ───────────────────────────────────────────────────── */
    #compat-warning {
      flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 2rem; text-align: center; gap: 1rem;
    }
    #compat-warning h1 { font-size: 1.25rem; color: var(--yellow); }
    #compat-warning p  { color: var(--muted); max-width: 460px; line-height: 1.7; }

    /* ── App ──────────────────────────────────────────────────────────────── */
    #app {
      flex-direction: column; min-height: 100vh;
      padding-bottom: 80px; /* sticky action bar */
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    header h1 { font-size: 1rem; font-weight: 700; }

    .model-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); }
    .model-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background .3s;
    }
    .model-dot.cached  { background: var(--green); }
    .model-dot.loading { background: var(--yellow); animation: blink 1s infinite; }
    .model-dot.missing { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.5rem; border-radius: 8px;
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; font-family: inherit;
      transition: color .15s, background .15s;
      min-width: 44px; min-height: 44px; justify-content: center;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Settings overlay + drawer ────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 100;
      align-items: flex-end; justify-content: stretch; /* mobile: bottom sheet */
    }
    .overlay.open { display: flex; }

    .drawer {
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 1.25rem; display: flex; flex-direction: column; gap: 1.1rem;
    }
    .drawer-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto -0.25rem;
    }

    @media (min-width: 640px) {
      .overlay { align-items: flex-start; justify-content: flex-end; } /* right drawer */
      .drawer {
        width: 380px; height: 100vh; max-height: 100vh;
        border-radius: 0; border-top: none; border-left: 1px solid var(--border);
      }
      .drawer-handle { display: none; }
    }

    .drawer-head { display: flex; align-items: center; justify-content: space-between; }
    .drawer-head h2 { font-size: 1rem; font-weight: 600; }

    .section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
      padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    }

    /* ── Form fields ──────────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
    .field input[type="text"], .field input[type="number"],
    .field input[type="password"], .field select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 0.55rem 0.75rem; font-size: 0.875rem; font-family: inherit; width: 100%;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .hint { font-size: 0.72rem; color: var(--muted); }
    .check-row { flex-direction: row; align-items: center; gap: 0.6rem; }
    .check-row label { color: var(--text); font-size: 0.875rem; font-weight: normal; }
    input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }

    .storage-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .storage-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    .storage-fill.warn { background: var(--red); }
    .storage-info { font-size: 0.78rem; color: var(--muted); }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.55rem 1.1rem; border-radius: 8px;
      font-size: 0.875rem; font-family: inherit; font-weight: 500;
      cursor: pointer; border: none; transition: background .15s, opacity .15s;
      min-height: 44px; white-space: nowrap;
    }
    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }
    .btn-danger { background: rgba(220,38,38,.08); color: var(--red); border: 1px solid rgba(220,38,38,.2); }
    .btn-danger:hover { background: rgba(220,38,38,.14); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; min-height: 36px; }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    main {
      flex: 1; padding: 1rem;
      max-width: 800px; margin: 0 auto; width: 100%;
      display: flex; flex-direction: column; gap: 1rem;
    }

    /* ── Panel ────────────────────────────────────────────────────────────── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .panel-head {
      padding: 0.875rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.75rem; flex-wrap: wrap;
    }
    .panel-title { font-weight: 600; font-size: 0.9rem; }
    .panel-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .panel-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    /* ── Notices ──────────────────────────────────────────────────────────── */
    .notice {
      padding: 0.75rem 1rem; font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .notice > span { flex: 1; }
    .notice.warn   { background: rgba(217,119,6,.06);  border-bottom: 1px solid rgba(217,119,6,.2);  color: var(--yellow); }
    .notice.info   { background: rgba(37,99,235,.06);  border-bottom: 1px solid rgba(37,99,235,.2);  color: var(--accent); }
    .notice.danger { background: rgba(220,38,38,.06);  border-bottom: 1px solid rgba(220,38,38,.2);  color: var(--red); }
    .inline-notice { border-radius: var(--r); border: 1px solid; }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .empty {
      padding: 3rem 1.5rem; text-align: center;
      color: var(--muted); font-size: 0.875rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    }
    .empty svg { opacity: .2; }

    /* ── File list ────────────────────────────────────────────────────────── */
    .file-item {
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1rem; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .file-item:last-child { border-bottom: none; }

    .file-row { display: flex; align-items: flex-start; gap: 0.6rem; }
    .file-check { flex-shrink: 0; accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; margin-top: 4px; }
    .file-info  { flex: 1; min-width: 0; }
    .file-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .card-title { font-size: 0.9rem; font-weight: 600; }
    .file-name  { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 0.1rem; }
    .file-meta  { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

    .badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.5rem;
      border-radius: 100px; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
    }
    .badge-pending     { background: var(--surface2); color: var(--muted); }
    .badge-converting  { background: rgba(37,99,235,.1); color: var(--accent); animation: pulse-btn 1s ease-in-out infinite; }
    .badge-transcribing{ background: rgba(37,99,235,.1); color: var(--accent); animation: pulse-btn 1s ease-in-out infinite; }
    .badge-done        { background: rgba(5,150,105,.1); color: var(--green); }
    .badge-error       { background: rgba(220,38,38,.1); color: var(--red); }
    .badge-deleted     { background: var(--surface2); color: var(--muted); }

    .progress-bar  { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 1px;
      animation: indeterminate 1.4s ease infinite; transform-origin: left;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%) scaleX(.4); }
      50%  { transform: translateX(60%)  scaleX(.8); }
      100% { transform: translateX(200%) scaleX(.4); }
    }
    @keyframes pulse-btn { 0%,100%{ opacity:1 } 50%{ opacity:.45 } }
    .btn-pulsing { animation: pulse-btn 1.2s ease-in-out infinite; }

    .transcript {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem 1rem; font-size: 0.875rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .tx-actions { display: flex; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }

    .notes-area {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem; font-size: 0.875rem; font-family: inherit;
      color: var(--text); resize: vertical; line-height: 1.5;
    }
    .notes-area:focus { outline: none; border-color: var(--accent); }
    .notes-footer { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .notes-view {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1rem; font-size: 0.875rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word; color: var(--muted);
    }

    /* ── ATF Entries ──────────────────────────────────────────────────────── */
    .atf-section { display: flex; flex-direction: column; gap: 0.75rem; }
    .atf-group   { display: flex; flex-direction: column; gap: 0.4rem; }
    .atf-label   {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; display: flex; align-items: center; gap: 0.4rem;
    }
    .atf-label.action  { color: var(--accent); }
    .atf-label.thought { color: var(--green); }
    .atf-label.feeling { color: var(--yellow); }
    .atf-chip {
      display: flex; align-items: flex-start; gap: 0.5rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.85rem; line-height: 1.5;
    }
    .atf-chip span { flex: 1; word-break: break-word; }
    .atf-chip button {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 0; font-size: 1rem; line-height: 1; flex-shrink: 0;
      opacity: .5; transition: opacity .15s;
    }
    .atf-chip button:hover { opacity: 1; color: var(--red); }
    .atf-add-row { display: flex; gap: 0.4rem; align-items: stretch; }
    .atf-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.85rem;
      font-family: inherit; color: var(--text);
    }
    .atf-input:focus { outline: none; border-color: var(--accent); }
    .atf-type-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.6rem; font-size: 0.8rem;
      font-family: inherit; color: var(--text); cursor: pointer; flex-shrink: 0;
    }
    .atf-type-select:focus { outline: none; border-color: var(--accent); }
    .atf-counter { font-size: 0.72rem; color: var(--muted); text-align: right; }

    /* ── Workflow steps ───────────────────────────────────────────────────────── */
    .workflow-steps { display: flex; flex-direction: column; gap: 0.75rem; padding: 1rem; }
    .workflow-step  { display: flex; align-items: flex-start; gap: 0.875rem; }
    .workflow-step-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; margin-top: 1px;
    }
    .workflow-step-text { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }

    .error-msg {
      font-size: 0.8rem; color: var(--red);
      background: rgba(220,38,38,.06); border: 1px solid rgba(220,38,38,.15);
      border-radius: 8px; padding: 0.6rem 0.875rem;
      display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap;
    }
    .error-msg span { flex: 1; }

    /* ── Model download ───────────────────────────────────────────────────── */
    .download-progress {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .download-bar  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .download-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    .download-label { font-size: 0.8rem; color: var(--muted); }

    /* ── Wizard ──────────────────────────────────────────────────────────── */
    .wizard-progress-wrap {
      height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: .75rem;
    }
    .wizard-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
    .wizard-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted); margin-bottom: .75rem;
    }
    .wizard-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
    }
    .wizard-nav-center { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
    @media (min-width: 640px) {
      .wizard-nav { left: 50%; transform: translateX(-50%); max-width: 800px;
        border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }

    /* ── Summary ──────────────────────────────────────────────────────────── */
    .summary-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; padding: 1rem;
    }
    .summary-stat {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: .875rem .75rem; text-align: center;
    }
    .summary-stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .summary-stat-label { font-size: 0.72rem; color: var(--muted); margin-top: .3rem; text-transform: uppercase; letter-spacing: .05em; }
    .summary-stat.action  .summary-stat-value { color: var(--accent); }
    .summary-stat.thought .summary-stat-value { color: var(--green); }
    .summary-stat.feeling .summary-stat-value { color: var(--yellow); }
    .summary-atf-list { display: flex; flex-direction: column; gap: .4rem; padding: .25rem 1rem 1rem; }
    .summary-atf-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .875rem; }
    .summary-atf-text   { font-size: .875rem; }
    .summary-atf-source { font-size: .72rem; color: var(--muted); font-family: var(--mono); margin-top: .2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Sticky action bar ────────────────────────────────────────────────── */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .action-bar .btn-primary { flex: 1; }

    @media (min-width: 640px) {
      .action-bar {
        left: 50%; transform: translateX(-50%);
        max-width: 800px;
        border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10/hooks';
import { signal, batch } from 'https://esm.sh/@preact/signals@1?deps=preact@10';
import htm from 'https://esm.sh/htm@3?deps=preact@10';
import { fromHub } from 'https://esm.sh/parakeet.js@1.4.4';

const html = htm.bind(h);

// ══════════════════════════════════════════════════════════════════════════════
// COMPAT CHECKS
// ══════════════════════════════════════════════════════════════════════════════

const hasFilePicker = 'showDirectoryPicker' in window;
const hasWebGPU     = 'gpu' in navigator;
// WebAssembly SIMD is required by the WASM backend of parakeet.js
const hasSimd = typeof WebAssembly !== 'undefined' && WebAssembly.validate(new Uint8Array([
  0,97,115,109,1,0,0,0,1,5,1,96,0,1,123,3,2,1,0,10,10,1,8,0,65,0,253,15,253,98,11
]));

// ══════════════════════════════════════════════════════════════════════════════
// PURE HELPERS
// ══════════════════════════════════════════════════════════════════════════════

const TX_PREFIX = 'transcription:';
const TX_INDEX  = 'transcription:index';

const fmtBytes     = b => b < 1048576 ? `${(b/1024).toFixed(0)} KB` : b < 1073741824 ? `${(b/1048576).toFixed(1)} MB` : `${(b/1073741824).toFixed(1)} GB`;
const fmtDur       = b => { const m = b / (17*1048576); return m < 1 ? `~${Math.round(m*60)}s` : `~${m.toFixed(1)} min`; };
const fmtDate      = ts => new Date(ts).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
const fmtDay  = ts => new Date(ts).toLocaleDateString(undefined, { weekday: 'long' });
const fmtTime = ts => new Date(ts).toLocaleTimeString(undefined, { timeStyle: 'short' });
const genId        = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&3|8)).toString(16); });

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════

const DEFAULTS = {
  language: 'en',
  vad_enabled: true,
  vad_threshold: 0.01,
  vad_padding_ms: 200,
  vad_min_silence_ms: 300,
  delete_after_transcription: false,
  auto_save: true,
  auto_transcribe: true,
  notion_api_key: '',
  notion_target_id: '',
  obsidian_vault_name: '',
};

// ══════════════════════════════════════════════════════════════════════════════
// SIGNALS
// ══════════════════════════════════════════════════════════════════════════════

const cfg             = signal((() => { try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem('tj_cfg') || '{}') }; } catch { return { ...DEFAULTS }; } })());
const files           = signal([]);
const dirHandle       = signal(null);
const busy            = signal(false);
const settingsOpen    = signal(false);
const modelStatus     = signal({ dot: 'missing', label: 'Model not downloaded' });
const modelPanelVis   = signal(false);
const simdErrorVis    = signal(false);
const dlProgress      = signal({ visible: false, pct: 0, label: '' });
const webgpuNoticeVis = signal(!hasWebGPU);
const deleteBannerVis = signal(false);
const historyEntries  = signal([]);
const storageInfo     = signal({ pct: 0, text: 'Calculating…', warn: false });
const appView         = signal('home');   // 'home' | 'wizard' | 'summary'
const wizardIndex     = signal(0);

// ══════════════════════════════════════════════════════════════════════════════
// STORAGE / HISTORY (localStorage)
// ══════════════════════════════════════════════════════════════════════════════

function getIndex() {
  try { return JSON.parse(localStorage.getItem(TX_INDEX) || '[]'); }
  catch { return []; }
}
function saveTx(entry) {
  const idx = getIndex(); idx.unshift(entry.id);
  localStorage.setItem(TX_INDEX, JSON.stringify(idx));
  localStorage.setItem(`${TX_PREFIX}${entry.id}`, JSON.stringify(entry));
}
function getTx(id) {
  try { return JSON.parse(localStorage.getItem(`${TX_PREFIX}${id}`) || 'null'); }
  catch { return null; }
}
function updateTx(id, patch) {
  const entry = getTx(id); if (!entry) return;
  localStorage.setItem(`${TX_PREFIX}${id}`, JSON.stringify({ ...entry, ...patch }));
}
function removeTx(id) {
  localStorage.setItem(TX_INDEX, JSON.stringify(getIndex().filter(x => x !== id)));
  localStorage.removeItem(`${TX_PREFIX}${id}`);
}
function allTx()            { return getIndex().map(id => getTx(id)).filter(Boolean); }
function getTxByFilename(n) { return allTx().find(e => e.filename === n) || null; }

function refreshHistory() { historyEntries.value = allTx(); }

async function refreshStorage() {
  let used = 0, total = 5 * 1024 * 1024;
  if (navigator.storage?.estimate) {
    try { ({ usage: used, quota: total } = await navigator.storage.estimate()); } catch {}
  } else {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      used += (k.length + (localStorage.getItem(k) || '').length) * 2;
    }
  }
  const pct = Math.min(100, (used / total) * 100);
  storageInfo.value = { pct, warn: pct > 80, text: `${fmtBytes(used)} used of ~${fmtBytes(total)}${pct > 80 ? ' — running low' : ''}` };
}

async function clearHistory() {
  if (!confirm('Delete all saved transcriptions? Source audio files are not affected.')) return;
  getIndex().forEach(id => localStorage.removeItem(`${TX_PREFIX}${id}`));
  localStorage.removeItem(TX_INDEX);
  refreshHistory(); refreshStorage();
}

// ══════════════════════════════════════════════════════════════════════════════
// PARAKEET.JS
// ══════════════════════════════════════════════════════════════════════════════

const MODEL_KEY = 'parakeet-tdt-0.6b-v3';
let parakeetModel = null;   // truthy when ready: true (worker mode) or model object (fallback)

// ── TRANSCRIPTION QUEUE ────────────────────────────────────────────────────
// All parakeet.js inference is serialised through a single queue so only one
// transcription runs at a time, keeping CPU/GPU usage bounded. Mic-triggered
// jobs (notes and ATF entries) set priority=true so they are inserted next in
// line rather than appended — they run as soon as the current job finishes.

const txQueue   = [];
let   txRunning = false;

function runQueued(fn, priority = false) {
  return new Promise((resolve, reject) => {
    const job = { fn, resolve, reject };
    if (priority) txQueue.unshift(job);
    else          txQueue.push(job);
    drainTxQueue();
  });
}

async function drainTxQueue() {
  if (txRunning || !txQueue.length) return;
  txRunning = true;
  const { fn, resolve, reject } = txQueue.shift();
  try   { resolve(await fn()); }
  catch (e) { reject(e); }
  finally   { txRunning = false; drainTxQueue(); }
}

// ── PARAKEET WORKER ────────────────────────────────────────────────────────
// parakeet.js is loaded inside a dedicated Web Worker so model inference runs
// off the main thread — keeping the UI responsive during long transcriptions.
// Audio data is transferred to the worker via ArrayBuffer transfer (zero-copy).
// If the Worker fails to initialise (e.g. library uses window APIs in an
// incompatible way), execution falls back transparently to the main thread.
// Note: SharedArrayBuffer is NOT required — only transferable ArrayBuffers.

let parakeetWorker   = null;
let workerJobSeq     = 0;
const workerPending  = {};    // job id → { resolve, reject }
let workerOnProgress = null;  // set during model download, cleared after

const WORKER_SCRIPT = `
import { fromHub } from 'https://esm.sh/parakeet.js@1.4.4';
const MODEL_KEY = 'parakeet-tdt-0.6b-v3';
let model = null;

self.onmessage = async ({ data }) => {
  if (data.type === 'load') {
    try {
      const opts = { ...data.opts };
      if (data.reportProgress) opts.progress = p => self.postMessage({ type: 'progress', p });
      model = await fromHub(MODEL_KEY, opts);
      self.postMessage({ type: 'ready' });
    } catch (e) {
      self.postMessage({ type: 'load_error', error: e.message });
    }
  } else if (data.type === 'transcribe') {
    try {
      const f32 = new Float32Array(data.buffer);
      const res  = await model.transcribeLongAudio(f32, 16000, { returnTimestamps: false });
      self.postMessage({ type: 'result', id: data.id, text: res.text });
    } catch (e) {
      self.postMessage({ type: 'error', id: data.id, error: e.message });
    }
  }
};
`;

function handleWorkerMessage({ data }) {
  if (data.type === 'result') {
    const cb = workerPending[data.id]; delete workerPending[data.id];
    if (cb) cb.resolve(data.text);
  } else if (data.type === 'error') {
    const cb = workerPending[data.id]; delete workerPending[data.id];
    if (cb) cb.reject(new Error(data.error));
  } else if (data.type === 'progress') {
    workerOnProgress?.(data.p);
  }
}

async function initParakeetWorker(opts, onProgress) {
  const blob = new Blob([WORKER_SCRIPT], { type: 'text/javascript' });
  const url  = URL.createObjectURL(blob);
  const w    = new Worker(url, { type: 'module' });
  URL.revokeObjectURL(url);
  workerOnProgress = onProgress || null;
  return new Promise((resolve, reject) => {
    w.onerror = e => { w.terminate(); reject(new Error(e.message || 'Worker init error')); };
    w.onmessage = ({ data }) => {
      if (data.type === 'ready') {
        parakeetWorker = w;
        workerOnProgress = null;
        w.onmessage = handleWorkerMessage;
        resolve();
      } else if (data.type === 'load_error') {
        w.terminate(); reject(new Error(data.error));
      } else if (data.type === 'progress') {
        workerOnProgress?.(data.p);
      }
    };
    w.postMessage({ type: 'load', opts, reportProgress: !!onProgress });
  });
}

async function loadParakeet(onProgress) {
  const opts = {
    backend:             hasWebGPU ? 'webgpu' : 'wasm',
    encoderQuant:        'fp32',   // int8 silently forced to fp32 for WebGPU anyway
    decoderQuant:        'int8',
    preprocessorBackend: 'js',
  };
  try {
    await initParakeetWorker(opts, onProgress);
    parakeetModel = true;   // sentinel — inference will run in the worker
  } catch (workerErr) {
    console.warn('Parakeet Worker unavailable, running on main thread:', workerErr.message);
    parakeetModel = await fromHub(MODEL_KEY, {
      ...opts,
      ...(onProgress ? { progress: onProgress } : {}),
    });
  }
  localStorage.setItem('parakeet_model_ready', 'true');
}

// priority=true inserts the job next in queue (after the current running job).
// Use for mic-triggered transcriptions so they are not blocked behind a long
// batch of file transcriptions.
async function runParakeet(float32, priority = false) {
  return runQueued(async () => {
    if (parakeetWorker) {
      // Worker path — transfer the ArrayBuffer (zero-copy; float32 becomes detached)
      return new Promise((resolve, reject) => {
        const id  = ++workerJobSeq;
        workerPending[id] = { resolve, reject };
        parakeetWorker.postMessage({ type: 'transcribe', id, buffer: float32.buffer }, [float32.buffer]);
      });
    }
    // Main-thread fallback
    if (!parakeetModel || parakeetModel === true) throw new Error('Model not loaded');
    const result = await parakeetModel.transcribeLongAudio(float32, 16000, { returnTimestamps: false });
    return result.text;
  }, priority);
}

// ══════════════════════════════════════════════════════════════════════════════
// MODEL MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════════

async function checkModelStatus() {
  if (!hasSimd) {
    modelStatus.value   = { dot: 'missing', label: 'Not supported' };
    modelPanelVis.value = true;
    simdErrorVis.value  = true;
    return;
  }
  if (localStorage.getItem('parakeet_model_ready') === 'true') {
    modelStatus.value   = { dot: 'loading', label: 'Loading model…' };
    modelPanelVis.value = false;
    try {
      await loadParakeet();
      modelStatus.value = { dot: 'cached', label: 'Model ready' };
      // If auto-reconnect already populated files, kick off auto-transcribe now
      if (cfg.value.auto_transcribe && !busy.value && files.value.some(f => f.status === 'pending')) {
        startBatch();
      }
    } catch {
      localStorage.removeItem('parakeet_model_ready');
      modelStatus.value   = { dot: 'missing', label: 'Model not downloaded' };
      modelPanelVis.value = true;
    }
  } else {
    modelStatus.value   = { dot: 'missing', label: 'Model not downloaded' };
    modelPanelVis.value = true;
  }
}

async function downloadModel() {
  dlProgress.value  = { visible: true, pct: 0, label: 'Starting download…' };
  modelStatus.value = { dot: 'loading', label: 'Downloading…' };
  try {
    await loadParakeet(p => {
      if (!p) return;
      const pct = typeof p === 'number' ? p : p.progress != null ? p.progress : (p.loaded && p.total) ? (p.loaded / p.total * 100) : null;
      dlProgress.value = {
        visible: true,
        pct:   pct != null ? Math.min(99, pct) : dlProgress.value.pct,
        label: p.file ? `Downloading ${p.file}…` : p.status === 'loading' ? 'Loading model into memory…' : dlProgress.value.label,
      };
    });
    dlProgress.value  = { visible: true, pct: 100, label: 'Done' };
    modelStatus.value = { dot: 'cached', label: 'Model ready' };
    modelPanelVis.value = false;
  } catch (e) {
    dlProgress.value  = { ...dlProgress.value, label: `Failed: ${e.message}` };
    modelStatus.value = { dot: 'missing', label: 'Download failed' };
    console.error('Model load failed:', e);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// AUDIO PIPELINE
// Returns Float32Array (mono 16 kHz) ready for parakeet.js directly.
// ══════════════════════════════════════════════════════════════════════════════

async function prepareAudio(arrayBuffer) {
  const audioCtx    = new AudioContext();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
  await audioCtx.close();
  const targetRate = 16000;
  const numFrames  = Math.ceil(audioBuffer.duration * targetRate);
  const offCtx     = new OfflineAudioContext(1, numFrames, targetRate);
  const src        = offCtx.createBufferSource();
  src.buffer = audioBuffer; src.connect(offCtx.destination); src.start();
  const rendered = await offCtx.startRendering();
  let float32 = rendered.getChannelData(0);
  if (cfg.value.vad_enabled) float32 = removeSilence(float32, targetRate);
  return float32;
}

function removeSilence(float32, sampleRate) {
  const c = cfg.value;
  const chunkMs      = 20;
  const chunkSize    = Math.floor(sampleRate * chunkMs / 1000);
  const padChunks    = Math.ceil(c.vad_padding_ms / chunkMs);
  const minSilChunks = Math.ceil(c.vad_min_silence_ms / chunkMs);
  const threshold    = c.vad_threshold;

  const voiced = [];
  for (let i = 0; i < float32.length; i += chunkSize) {
    const chunk = float32.subarray(i, i + chunkSize);
    const rms   = Math.sqrt(chunk.reduce((s, x) => s + x * x, 0) / chunk.length);
    voiced.push(rms >= threshold);
  }
  const padded = voiced.slice();
  for (let i = 0; i < voiced.length; i++) {
    if (voiced[i]) {
      const lo = Math.max(0, i - padChunks), hi = Math.min(voiced.length, i + padChunks + 1);
      for (let j = lo; j < hi; j++) padded[j] = true;
    }
  }
  let run = 0;
  for (let i = 0; i <= padded.length; i++) {
    if (i < padded.length && !padded[i]) { run++; }
    else { if (run > 0 && run < minSilChunks) for (let j = i - run; j < i; j++) padded[j] = true; run = 0; }
  }
  const parts = [];
  for (let i = 0; i < padded.length; i++) if (padded[i]) parts.push(float32.subarray(i * chunkSize, Math.min((i+1)*chunkSize, float32.length)));
  if (!parts.length) return float32;
  const out = new Float32Array(parts.reduce((s, c) => s + c.length, 0));
  let off = 0; for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}

// ══════════════════════════════════════════════════════════════════════════════
// FOLDER HANDLE PERSISTENCE (IndexedDB)
// Stores the last-used FileSystemDirectoryHandle so we can auto-reconnect.
// ══════════════════════════════════════════════════════════════════════════════

const HANDLE_DB    = 'tj-fs-handles';
const HANDLE_STORE = 'handles';
const HANDLE_KEY   = 'last-dir';

function openHandleDb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(HANDLE_DB, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(HANDLE_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = () => rej(req.error);
  });
}

async function saveHandle(handle) {
  try {
    const db = await openHandleDb();
    const tx = db.transaction(HANDLE_STORE, 'readwrite');
    tx.objectStore(HANDLE_STORE).put(handle, HANDLE_KEY);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = () => rej(tx.error); });
  } catch (e) { console.warn('Could not save folder handle:', e); }
}

async function loadHandle() {
  try {
    const db = await openHandleDb();
    const tx = db.transaction(HANDLE_STORE, 'readonly');
    return await new Promise((res, rej) => {
      const req = tx.objectStore(HANDLE_STORE).get(HANDLE_KEY);
      req.onsuccess = () => res(req.result || null);
      req.onerror   = () => rej(req.error);
    });
  } catch { return null; }
}

async function tryAutoReconnect() {
  const handle = await loadHandle();
  if (!handle) return;
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') return;
    const found = [];
    await scan(handle, '', found);
    found.sort((a, b) => a.path.localeCompare(b.path));
    if (!found.length) return;
    batch(() => {
      dirHandle.value   = handle;
      files.value       = found;
      wizardIndex.value = 0;
      appView.value     = 'wizard';
    });
    if (cfg.value.auto_transcribe && parakeetModel && found.some(f => f.status === 'pending')) {
      startBatch();
    }
  } catch (e) { console.warn('Auto-reconnect failed:', e); }
}

// ══════════════════════════════════════════════════════════════════════════════
// DRIVE PICKER
// ══════════════════════════════════════════════════════════════════════════════

function updateFile(i, patch) {
  files.value = files.value.map((f, idx) => idx === i ? { ...f, ...patch } : f);
}

async function pickDrive() {
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    const found  = [];
    await scan(handle, '', found);
    found.sort((a, b) => a.path.localeCompare(b.path));
    batch(() => {
      dirHandle.value   = handle;
      files.value       = found;
      wizardIndex.value = 0;
      appView.value     = found.length ? 'wizard' : 'home';
    });
    await saveHandle(handle);
    if (found.length && cfg.value.auto_transcribe && parakeetModel && found.some(f => f.status === 'pending')) {
      if (cfg.value.delete_after_transcription) deleteBannerVis.value = true;
      else startBatch();
    }
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function scan(handle, prefix, found) {
  for await (const [name, entry] of handle.entries()) {
    const path = prefix ? `${prefix}/${name}` : name;
    const AUDIO_EXTS = /\.(wav|mp3|m4a|aac|ogg|oga|opus|webm|flac)$/i;
    if (entry.kind === 'file' && AUDIO_EXTS.test(name)) {
      const file     = await entry.getFile();
      const existing = getTxByFilename(name);
      found.push({
        handle: entry, name, path, size: file.size, mtime: file.lastModified,
        selected:   !existing,
        status:     existing ? 'done'               : 'pending',
        transcript: existing ? existing.text        : null,
        savedId:    existing ? existing.id          : null,
        deleted:    existing ? (existing.deleted ?? false) : false,
        notes:      existing ? (existing.notes   || '')  : '',
        entries:    existing ? (existing.entries || [])  : [],
        error: null,
      });
    } else if (entry.kind === 'directory') {
      await scan(entry, path, found);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TRANSCRIPTION FLOW
// ══════════════════════════════════════════════════════════════════════════════

function requestBatch() {
  if (busy.value) return;
  if (cfg.value.delete_after_transcription) { deleteBannerVis.value = true; }
  else startBatch();
}

async function startBatch() {
  if (busy.value) return;
  busy.value = true;
  for (let i = 0; i < files.value.length; i++) {
    const f = files.value[i];
    if (!f.selected || f.status === 'done' || f.status === 'cleared') continue;
    await transcribeFile(i);
  }
  busy.value = false;
  refreshHistory();
}

async function transcribeFile(i) {
  updateFile(i, { status: 'converting', error: null });
  try {
    const raw    = await files.value[i].handle.getFile();
    let float32  = await prepareAudio(await raw.arrayBuffer());

    updateFile(i, { status: 'transcribing' });

    const text = await runParakeet(float32);
    float32 = null; // release ~100 MB+ audio buffer

    if (!text?.trim()) throw new Error('Transcription returned an empty result');

    const transcript = text.trim();
    updateFile(i, { transcript, status: 'done' });

    let savedId = files.value[i].savedId;

    // Persist — must succeed before deletion is allowed
    if (cfg.value.auto_save) {
      const entry = {
        id:              genId(),
        filename:        files.value[i].name,
        transcribedAt:   new Date().toISOString(),
        durationSeconds: Math.round(files.value[i].size / (17 * 1024 * 1024) * 60),
        text:            transcript,
        silenceRemoved:  cfg.value.vad_enabled,
        deleted:         false,
        notes:           '',
        entries:         [],
      };
      saveTx(entry);
      savedId = entry.id;
      updateFile(i, { savedId });
      refreshStorage();
    }

    // Per-file deletion — only after localStorage confirmed
    if (cfg.value.delete_after_transcription && savedId) {
      try {
        await files.value[i].handle.remove();
        updateFile(i, { deleted: true });
        updateTx(savedId, { deleted: true });
      } catch (e) { console.warn('Could not delete', files.value[i].name, e); }
    }

    updateFile(i, { handle: null }); // release file handle
  } catch (e) {
    updateFile(i, { error: e.message, status: 'error' });
  }
}

async function retryFile(i) {
  if (busy.value) return;
  busy.value = true;
  await transcribeFile(i);
  busy.value = false;
  refreshHistory();
}

// WIZARD NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════

function goNext() {
  const idx = wizardIndex.value;
  const len = files.value.length;
  if (idx < len - 1) wizardIndex.value = idx + 1;
  else appView.value = 'summary';
}

function goPrev() {
  if (wizardIndex.value > 0) wizardIndex.value--;
}

function startNewSession() {
  batch(() => {
    appView.value    = 'home';
    wizardIndex.value = 0;
    files.value      = [];
    dirHandle.value  = null;
    busy.value       = false;
    deleteBannerVis.value = false;
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// COPY / SHARE / EXPORT / CONNECTORS
// ══════════════════════════════════════════════════════════════════════════════

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); }
  catch { prompt('Copy the text below:', text); }
}

async function shareOne(i) {
  const f = files.value[i]; if (!f?.transcript) return;
  try { await navigator.share({ title: f.name, text: f.transcript }); }
  catch { copyToClipboard(f.transcript); }
}

async function shareAll() {
  const done = files.value.filter(f => f.transcript !== null); if (!done.length) return;
  const text = done.map(f => `${f.path}\n\n${f.transcript}`).join('\n\n---\n\n');
  try { await navigator.share({ title: 'Transcriptions', text }); }
  catch { copyToClipboard(text); }
}

function exportAll(fmt) {
  const done = files.value.filter(f => f.transcript !== null); if (!done.length) return;
  const sep  = '\n\n---\n\n';
  const content = fmt === 'txt'
    ? done.map(f => `${f.path}\n\n${f.transcript}`).join(sep)
    : done.map(f => `## ${f.path}\n\n${f.transcript}`).join(sep);
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], { type: 'text/plain' })),
    download: `transcriptions.${fmt}`,
  });
  a.click(); URL.revokeObjectURL(a.href);
}

async function sendToNotion(i) {
  const f = files.value[i]; if (!f?.transcript) return;
  try {
    const res = await fetch(`https://api.notion.com/v1/blocks/${cfg.value.notion_target_id}/children`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${cfg.value.notion_api_key}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ children: [
        { type: 'heading_2', heading_2: { rich_text: [{ type: 'text', text: { content: f.name } }] } },
        { type: 'paragraph', paragraph: { rich_text: [{ type: 'text', text: { content: f.transcript } }] } },
      ] }),
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || `HTTP ${res.status}`); }
    alert('Sent to Notion.');
  } catch (e) {
    alert(`Notion export failed: ${e.message}\n\nNote: Notion's API may block browser-direct requests due to CORS restrictions.`);
  }
}

function sendToObsidian(i) {
  const f = files.value[i]; if (!f?.transcript || !cfg.value.obsidian_vault_name) return;
  const name = f.name.replace(/\.[^.]+$/, '');
  window.open(`obsidian://new?vault=${encodeURIComponent(cfg.value.obsidian_vault_name)}&name=${encodeURIComponent(name)}&content=${encodeURIComponent(f.transcript)}`);
}

// ══════════════════════════════════════════════════════════════════════════════

const ATF_MAX   = 160;
const ATF_TYPES = [
  { type: 'action',  label: 'Actions',  placeholder: 'Something to do…' },
  { type: 'thought', label: 'Thoughts', placeholder: 'An insight or reflection…' },
  { type: 'feeling', label: 'Feelings', placeholder: 'An emotional state…' },
];

function saveFileEntries(i, entries) {
  updateFile(i, { entries });
  const id = files.value[i]?.savedId;
  if (id) updateTx(id, { entries });
}

const randomAtfType = () => ATF_TYPES[Math.floor(Math.random() * ATF_TYPES.length)].type;

function AtfInput({ fileEntries, fileIndex }) {
  const [draft,   setDraft]   = useState('');
  const [type,    setType]    = useState(randomAtfType);
  const [atfRec,  setAtfRec]  = useState(false);
  const [atfBusy, setAtfBusy] = useState(false);
  const atfMediaRef  = useRef(null);
  const atfChunksRef = useRef([]);

  const add = () => {
    const text = draft.trim();
    if (!text) return;
    const entry = { id: genId(), type, text, createdAt: new Date().toISOString() };
    saveFileEntries(fileIndex, [...fileEntries, entry]);
    setDraft('');
    setType(randomAtfType());
  };

  const remove = id => saveFileEntries(fileIndex, fileEntries.filter(e => e.id !== id));
  const onKey  = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); add(); } };
  const placeholder = ATF_TYPES.find(a => a.type === type)?.placeholder || '';

  const toggleAtfMic = async () => {
    if (atfRec) { atfMediaRef.current?.stop(); setAtfRec(false); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      atfChunksRef.current = [];
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if (e.data.size > 0) atfChunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setAtfBusy(true);
        try {
          const blob = new Blob(atfChunksRef.current, { type: mr.mimeType });
          const f32  = await prepareAudio(await blob.arrayBuffer());
          const text = await runParakeet(f32, true);  // priority — jump queue
          if (text?.trim()) setDraft(prev => prev ? `${prev} ${text.trim()}` : text.trim());
        } catch (e) { console.error('ATF mic transcription failed:', e); }
        setAtfBusy(false);
      };
      mr.start(); atfMediaRef.current = mr; setAtfRec(true);
    } catch (e) { console.error('Mic access denied:', e); }
  };

  return html`
    <div class="atf-section">
      ${ATF_TYPES.map(({ type: t, label }) => {
        const items = fileEntries.filter(e => e.type === t);
        if (!items.length) return null;
        return html`
          <div class="atf-group" key=${t}>
            <div class=${'atf-label ' + t}>${label}</div>
            ${items.map(e => html`
              <div class="atf-chip" key=${e.id}>
                <span>${e.text}</span>
                <button onClick=${() => remove(e.id)} title="Remove" aria-label="Remove entry">×</button>
              </div>
            `)}
          </div>`;
      })}
      <div class="atf-add-row">
        <select class="atf-type-select" value=${type} onChange=${e => setType(e.target.value)}>
          ${ATF_TYPES.map(({ type: t, label }) => html`<option value=${t}>${label.slice(0, -1)}</option>`)}
        </select>
        <input class="atf-input" type="text" placeholder=${placeholder}
          maxlength=${ATF_MAX} value=${draft}
          onInput=${e => setDraft(e.target.value)}
          onKeyDown=${onKey} />
        <button class="btn btn-ghost btn-sm" data-mic
          disabled=${!parakeetModel || atfBusy}
          title=${!parakeetModel ? 'Model not loaded' : atfRec ? 'Stop recording' : 'Speak an entry'}
          onClick=${toggleAtfMic}>
          ${atfBusy ? '…' : atfRec ? html`<${IconMicActive} />` : html`<${IconMic} />`}
        </button>
        <button class="btn btn-ghost btn-sm" onClick=${add} disabled=${!draft.trim()}>Add</button>
      </div>
      ${draft.length > ATF_MAX - 30 && html`<div class="atf-counter">${ATF_MAX - draft.length} left</div>`}
    </div>`;
}

const BADGE_MAP = {
  pending:      ['badge-pending',      'Pending'],
  converting:   ['badge-converting',   'Converting'],
  transcribing: ['badge-transcribing', 'Transcribing'],
  done:         ['badge-done',         'Done'],
  error:        ['badge-error',        'Error'],
  cleared:      ['badge-pending',      'Cleared'],
};

function FileItem({ f, i }) {
  const [notesDraft, setNotesDraft] = useState(f.notes || '');
  const [recording,  setRecording]  = useState(false);
  const [micBusy,    setMicBusy]    = useState(false);
  const [elapsed,    setElapsed]    = useState(0);
  const mediaRecRef   = useRef(null);
  const chunksRef     = useRef([]);
  const notesTimerRef = useRef(null);
  const elapsedRef    = useRef(null);

  useEffect(() => {
    if (f.status === 'transcribing') {
      setElapsed(0);
      elapsedRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    } else {
      clearInterval(elapsedRef.current);
    }
    return () => clearInterval(elapsedRef.current);
  }, [f.status]);

  const [bc, bl]   = BADGE_MAP[f.status] || BADGE_MAP.pending;
  const inProgress = f.status === 'converting' || f.status === 'transcribing';
  const c          = cfg.value;

  const persistNotes = text => {
    updateFile(i, { notes: text });
    if (f.savedId) updateTx(f.savedId, { notes: text });
  };

  const onNotesChange = e => {
    const text = e.target.value;
    setNotesDraft(text);
    clearTimeout(notesTimerRef.current);
    notesTimerRef.current = setTimeout(() => persistNotes(text), 800);
  };

  const toggleRecording = async () => {
    if (recording) { mediaRecRef.current?.stop(); setRecording(false); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunksRef.current = [];
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setMicBusy(true);
        try {
          const blob = new Blob(chunksRef.current, { type: mr.mimeType });
          const f32  = await prepareAudio(await blob.arrayBuffer());
          const text = await runParakeet(f32, true);  // priority — jump queue
          if (text?.trim()) {
            const next = notesDraft ? `${notesDraft} ${text.trim()}` : text.trim();
            setNotesDraft(next);
            persistNotes(next);
          }
        } catch (e) { console.error('Mic transcription failed:', e); }
        setMicBusy(false);
      };
      mr.start(); mediaRecRef.current = mr; setRecording(true);
    } catch (e) { console.error('Mic access denied:', e); }
  };

  const onDelete = () => {
    if (!confirm('Remove this transcription? The source file is not affected.')) return;
    if (f.savedId) removeTx(f.savedId);
    if (f.deleted) {
      files.value = files.value.filter((_, idx) => idx !== i);
    } else {
      updateFile(i, { transcript: null, status: 'cleared', savedId: null, notes: '', entries: [] });
      setNotesDraft('');
    }
    refreshHistory(); refreshStorage();
  };

  return html`
    <div class="file-item">
      <div class="file-row">
        <div class="file-info">
          <div class="file-header">
            <div class="card-title">${fmtTime(f.mtime)}</div>
            <span class=${'badge ' + bc}>${bl}</span>
          </div>
          <div class="file-name" title=${f.path}>${f.path}</div>
          <div class="file-meta">${fmtBytes(f.size)} · ${fmtDur(f.size)}${f.status === 'transcribing' && elapsed > 0 ? ` · ${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}` : ''}</div>
        </div>
      </div>
      ${inProgress && html`<div class="progress-bar"><div class="progress-fill"></div></div>`}
      ${f.transcript !== null && html`
        <div class="transcript">${f.transcript}</div>
        <div class="tx-actions">
          ${c.notion_api_key && c.notion_target_id && html`<button class="btn btn-ghost btn-sm" onClick=${() => sendToNotion(i)}>Notion</button>`}
          ${c.obsidian_vault_name && html`<button class="btn btn-ghost btn-sm" onClick=${() => sendToObsidian(i)}>Obsidian</button>`}
          <button class="btn btn-danger btn-sm" style="margin-left:auto" onClick=${onDelete}>Delete</button>
        </div>
        <textarea class="notes-area" placeholder="Notes…" rows="3"
          value=${notesDraft} onInput=${onNotesChange}
        ></textarea>
        <div class="notes-footer" style="justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" data-mic
            disabled=${!parakeetModel || micBusy}
            title=${!parakeetModel ? 'Model not loaded' : recording ? 'Stop recording' : 'Speak a note'}
            onClick=${toggleRecording}>
            ${micBusy ? 'Transcribing…' : recording
              ? html`<${IconMicActive} /> Stop`
              : html`<${IconMic} />`}
          </button>
        </div>
        <${AtfInput} fileEntries=${f.entries || []} fileIndex=${i} />
      `}
      ${f.error && html`
        <div class="error-msg">
          <span>${f.error}</span>
          <button class="btn btn-ghost btn-sm" onClick=${() => retryFile(i)}>Retry</button>
        </div>
      `}
    </div>`;
}

function WizardView() {
  const fs  = files.value;
  const idx = wizardIndex.value;
  const f   = fs[idx];
  if (!f) return null;
  const pct = Math.round(((idx + 1) / fs.length) * 100);
  return html`
    <div>
      <div class="wizard-progress-wrap"><div class="wizard-progress-fill" style=${'width:' + pct + '%'}></div></div>
      <div class="wizard-meta">

function WizardNav() {
  const fs     = files.value;
  const idx    = wizardIndex.value;
  const f      = fs[idx];
  const isLast = idx === fs.length - 1;
  const inProg = f?.status === 'converting' || f?.status === 'transcribing';
  return html`
    <div class="wizard-nav">
      ${idx > 0
        ? html`<button class="btn btn-ghost" onClick=${goPrev}>← Back</button>`
        : html`<div></div>`}
      <span class="wizard-nav-center">${idx + 1} / ${fs.length}</span>
      <button class=${'btn btn-primary' + (inProg ? ' btn-pulsing' : '')}
        disabled=${inProg} onClick=${goNext}>
        ${inProg ? 'Transcribing…' : isLast ? 'Finish →' : 'Next →'}
      </button>
    </div>`;
}

function SummaryPage() {
  const fs  = files.value;
  const all = fs.flatMap(f => (f.entries || []).map(e => ({ ...e, filename: f.name })));
  const byType = t => all.filter(e => e.type === t);
  const totalWords = fs.reduce((s, f) => s + (f.transcript ? f.transcript.split(/\s+/).filter(Boolean).length : 0), 0);

  const deleteAudio = async () => {
    if (!confirm('Permanently delete all source audio files from the selected folder? This cannot be undone.')) return;
    for (const f of files.value) {
      if (f.handle && !f.deleted) {
        try { await f.handle.remove(); updateFile(files.value.indexOf(f), { deleted: true }); } catch {}
      }
    }
  };

  const deleteTx = () => {
    if (!confirm('Remove all transcriptions and entries for this session from your browser? This cannot be undone.')) return;
    files.value.forEach(f => { if (f.savedId) removeTx(f.savedId); });
    refreshHistory(); refreshStorage();
    startNewSession();
  };

  return html`
    <div style="display:flex;flex-direction:column;gap:1rem;padding-bottom:2rem">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Session complete</div>
            <div class="panel-meta">${fs.length} recording${fs.length !== 1 ? 's' : ''} · ${totalWords.toLocaleString()} words transcribed</div>
          </div>
          <button class="btn btn-ghost btn-sm" onClick=${() => { appView.value = 'wizard'; wizardIndex.value = files.value.length - 1; }}>← Review</button>
        </div>
        <div class="summary-stats">
          <div class="summary-stat action">
            <div class="summary-stat-value">${byType('action').length}</div>
            <div class="summary-stat-label">Actions</div>
          </div>
          <div class="summary-stat thought">
            <div class="summary-stat-value">${byType('thought').length}</div>
            <div class="summary-stat-label">Thoughts</div>
          </div>
          <div class="summary-stat feeling" style="grid-column:span 1">
            <div class="summary-stat-value">${byType('feeling').length}</div>
            <div class="summary-stat-label">Feelings</div>
          </div>
          <div class="summary-stat" style="grid-column:span 1">
            <div class="summary-stat-value">${all.length}</div>
            <div class="summary-stat-label">Total entries</div>
          </div>
        </div>
      </div>

      ${ATF_TYPES.map(({ type, label }) => {
        const items = byType(type);
        if (!items.length) return null;
        return html`
          <div class="panel" key=${type}>
            <div class="panel-head"><div class=${'panel-title atf-label ' + type}>${label}</div></div>
            <div class="summary-atf-list">
              ${items.map(e => html`
                <div class="summary-atf-item" key=${e.id}>
                  <div class="summary-atf-text">${e.text}</div>
                  <div class="summary-atf-source">${e.filename}</div>
                </div>
              `)}
            </div>
          </div>`;
      })}

      <div class="panel">
        <div class="panel-head"><div class="panel-title">Clean up</div></div>
        <div style="padding:1rem;display:flex;flex-direction:column;gap:.75rem">
          <p style="font-size:.875rem;color:var(--muted);line-height:1.65">
            Your transcriptions and entries are saved in your browser. These options are optional.
          </p>
          <button class="btn btn-danger" onClick=${deleteAudio}>Delete source audio files</button>
          <button class="btn btn-danger" onClick=${deleteTx}>Delete transcriptions from browser</button>
          <button class="btn btn-ghost" onClick=${startNewSession}>Start new session</button>
        </div>
      </div>
    </div>`;
}

  return html`

function SettingsDrawer() {
  const open = settingsOpen.value;
  const c    = cfg.value;

  const [lang,      setLang]      = useState(c.language);
  const [vadOn,     setVadOn]     = useState(c.vad_enabled);
  const [thresh,    setThresh]    = useState(c.vad_threshold);
  const [pad,       setPad]       = useState(c.vad_padding_ms);
  const [silGap,    setSilGap]    = useState(c.vad_min_silence_ms);
  const [autoSave,  setAutoSave]  = useState(c.auto_save);
  const [autoTx,    setAutoTx]    = useState(c.auto_transcribe);
  const [delAfter,  setDelAfter]  = useState(c.delete_after_transcription);
  const [notionKey, setNotionKey] = useState(c.notion_api_key);
  const [notionId,  setNotionId]  = useState(c.notion_target_id);
  const [obsidian,  setObsidian]  = useState(c.obsidian_vault_name);
  const si = storageInfo.value;

  // Reset draft when drawer opens
  useEffect(() => {
    if (!open) return;
    const c = cfg.value;
    setLang(c.language); setVadOn(c.vad_enabled); setThresh(c.vad_threshold);
    setPad(c.vad_padding_ms); setSilGap(c.vad_min_silence_ms); setAutoSave(c.auto_save);
    setAutoTx(c.auto_transcribe); setDelAfter(c.delete_after_transcription); setNotionKey(c.notion_api_key);
    setNotionId(c.notion_target_id); setObsidian(c.obsidian_vault_name);
  }, [open]);

  const save = () => {
    const prevDelete = cfg.value.delete_after_transcription;
    const newCfg = {
      language: lang,
      vad_enabled:                vadOn,
      vad_threshold:              parseFloat(thresh)  || DEFAULTS.vad_threshold,
      vad_padding_ms:             parseInt(pad)       || DEFAULTS.vad_padding_ms,
      vad_min_silence_ms:         parseInt(silGap)    || DEFAULTS.vad_min_silence_ms,
      auto_save:                  autoSave,
      auto_transcribe:            autoTx,
      delete_after_transcription: delAfter,
      notion_api_key:             notionKey,
      notion_target_id:           notionId,
      obsidian_vault_name:        obsidian,
    };
    if (!prevDelete && delAfter) {
      alert('Delete after transcription enabled.\n\nSource audio files will be permanently deleted from the selected folder after each successful transcription. Ensure the folder is not your only copy of these recordings.');
    }
    cfg.value = newCfg;
    localStorage.setItem('tj_cfg', JSON.stringify(newCfg));
    settingsOpen.value = false;
  };

  if (!open) return null;
  return html`
    <div class="overlay open" onClick=${e => { if (e.target === e.currentTarget) settingsOpen.value = false; }}>
      <div class="drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-head">
          <h2>Settings</h2>
          <button class="icon-btn" aria-label="Close settings" onClick=${() => settingsOpen.value = false}><${IconX} /></button>
        </div>

        <div class="section-label">Transcription</div>
        <div class="field check-row">
          <input type="checkbox" checked=${autoTx} onChange=${e => setAutoTx(e.target.checked)} />
          <label>Auto-transcribe on drive selection</label>
        </div>
        <div class="field">
          <label>Language</label>
          <input type="text" placeholder="en" maxlength="10" value=${lang} onInput=${e => setLang(e.target.value)} />
          <span class="hint">ISO 639-1 code (en, sv, fr…). Leave blank to auto-detect.</span>
        </div>

        <div class="section-label">Silence Removal (VAD)</div>
        <div class="field check-row">
          <input type="checkbox" checked=${vadOn} onChange=${e => setVadOn(e.target.checked)} />
          <label>Remove silent sections before transcription</label>
        </div>
        <div style=${'opacity:' + (vadOn ? '1' : '.4')}>
          <div class="field" style="margin-top:.6rem">
            <label>RMS Threshold</label>
            <input type="number" step="0.001" min="0" max="1" placeholder="0.01" disabled=${!vadOn} value=${thresh} onInput=${e => setThresh(e.target.value)} />
            <span class="hint">Energy below this level is treated as silence</span>
          </div>
          <div class="field" style="margin-top:.6rem">
            <label>Padding (ms)</label>
            <input type="number" step="10" min="0" placeholder="200" disabled=${!vadOn} value=${pad} onInput=${e => setPad(e.target.value)} />
            <span class="hint">Audio retained around voiced regions</span>
          </div>
          <div class="field" style="margin-top:.6rem">
            <label>Min silence gap (ms)</label>
            <input type="number" step="10" min="0" placeholder="300" disabled=${!vadOn} value=${silGap} onInput=${e => setSilGap(e.target.value)} />
            <span class="hint">Minimum gap before it is removed</span>
          </div>
        </div>

        <div class="section-label">Storage</div>
        <div class="field check-row">
          <input type="checkbox" checked=${autoSave} onChange=${e => setAutoSave(e.target.checked)} />
          <label>Auto-save transcriptions to history</label>
        </div>
        <div style="display:flex;flex-direction:column;gap:.4rem">
          <div class="storage-bar"><div class=${'storage-fill' + (si.warn ? ' warn' : '')} style=${'width:' + si.pct + '%'}></div></div>
          <div class="storage-info">${si.text}</div>
          <button class="btn btn-danger btn-sm" style="align-self:flex-start" onClick=${clearHistory}>Clear History</button>
        </div>

        <div class="section-label">Drive</div>
        <div class="field check-row">
          <input type="checkbox" checked=${delAfter} onChange=${e => setDelAfter(e.target.checked)} />
          <label>Delete source files after transcription</label>
        </div>
        <p class="hint">Files are deleted per-file immediately after transcription succeeds and is saved to history. You will be asked to confirm before each batch.</p>

        <div class="section-label">Connectors — Notion</div>
        <div class="field">
          <label>Integration Token</label>
          <input type="password" placeholder="secret_…" value=${notionKey} onInput=${e => setNotionKey(e.target.value)} />
        </div>
        <div class="field">
          <label>Target Page or Database ID</label>
          <input type="text" placeholder="32-character ID" value=${notionId} onInput=${e => setNotionId(e.target.value)} />
        </div>

        <div class="section-label">Connectors — Obsidian</div>
        <div class="field">
          <label>Vault Name</label>
          <input type="text" placeholder="My Vault" value=${obsidian} onInput=${e => setObsidian(e.target.value)} />
          <span class="hint">Opens a new note via obsidian:// URI. Obsidian must be running locally.</span>
        </div>

        <div class="section-label">Connectors — Coming Soon</div>
        <p class="hint" style="padding-bottom:.25rem">Claude · ChatGPT · Custom Webhook</p>

        <button class="btn btn-primary" onClick=${save}>Save Settings</button>
      </div>
    </div>`;
}

function App() {
  useEffect(() => {
    checkModelStatus();
    refreshHistory();
    refreshStorage();
    tryAutoReconnect();
  }, []);

  const view = appView.value;

  return html`
    <div id="app" style="display:flex;flex-direction:column">
      <${SettingsDrawer} />
      <${Header} />
      <main>
        ${view === 'home' && html`
          <${ModelPanel} />
          ${webgpuNoticeVis.value && html`
            <div class="notice warn inline-notice">
              <span>WebGPU not available — using WASM mode (~650 MB). Transcription will work but may be slower.</span>
            </div>
          `}
          <${FilesPanel} />
        `}
        ${view === 'wizard'  && html`<${WizardView} />`}
        ${view === 'summary' && html`<${SummaryPage} />`}
      </main>
      ${view === 'home'   && html`<${ActionBar} />`}
      ${view === 'wizard' && html`<${WizardNav} />`}
    </div>`;
}

function CompatWarning() {
  return html`
    <div id="compat-warning" style="display:flex">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--yellow)">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <h1>Chromium-based browser required</h1>
      <p>This app uses the File System Access API, which is only supported in Chrome, Edge, and Brave. Please open this page in one of those browsers.</p>
    </div>`;
}

// Test hooks — used by tests/notes-features.test.js
window._tj = {
  files, cfg, busy, historyEntries, appView, wizardIndex,
  get parakeetModel()  { return parakeetModel; },
  // Nulling parakeetModel in tests also clears the worker reference so mic
  // button disabled-state checks behave correctly in test environments.
  set parakeetModel(v) { parakeetModel = v; if (!v) parakeetWorker = null; },
  get parakeetWorker() { return parakeetWorker; },
};

render(hasFilePicker ? html`<${App} />` : html`<${CompatWarning} />`, document.getElementById('root'));
</script>
</body>
</html>
