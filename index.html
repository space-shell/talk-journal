<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJI Mic 2 Transcriber</title>
  <style>
    /* Light-first — dark mode via prefers-color-scheme */
    :root {
      --bg:       #f9fafb;
      --surface:  #ffffff;
      --surface2: #f3f4f6;
      --border:   #e5e7eb;
      --text:     #111827;
      --muted:    #6b7280;
      --accent:   #2563eb;
      --accent-h: #1d4ed8;
      --green:    #059669;
      --red:      #dc2626;
      --yellow:   #d97706;
      --r:        10px;
      --mono:     ui-monospace, 'Cascadia Code', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #0f1117;
        --surface:  #1a1d26;
        --surface2: #22263a;
        --border:   #2e3348;
        --text:     #e8eaf0;
        --muted:    #7a7f9a;
        --accent:   #4f7ef8;
        --accent-h: #6b94ff;
        --green:    #34d399;
        --red:      #f87171;
        --yellow:   #fbbf24;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 15px;
    }

    /* ── Compat warning ───────────────────────────────────────────────────── */
    #compat-warning {
      flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 2rem; text-align: center; gap: 1rem;
    }
    #compat-warning h1 { font-size: 1.25rem; color: var(--yellow); }
    #compat-warning p  { color: var(--muted); max-width: 460px; line-height: 1.7; }

    /* ── App ──────────────────────────────────────────────────────────────── */
    #app {
      flex-direction: column; min-height: 100vh;
      padding-bottom: 80px; /* sticky action bar */
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    header h1 { font-size: 1rem; font-weight: 700; }

    .model-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--muted); }
    .model-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background .3s;
    }
    .model-dot.cached  { background: var(--green); }
    .model-dot.loading { background: var(--yellow); animation: blink 1s infinite; }
    .model-dot.missing { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.5rem; border-radius: 8px;
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem; font-family: inherit;
      transition: color .15s, background .15s;
      min-width: 44px; min-height: 44px; justify-content: center;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Settings overlay + drawer ────────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 100;
      align-items: flex-end; justify-content: stretch; /* mobile: bottom sheet */
    }
    .overlay.open { display: flex; }

    .drawer {
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 1.25rem; display: flex; flex-direction: column; gap: 1.1rem;
    }
    .drawer-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto -0.25rem;
    }

    @media (min-width: 640px) {
      .overlay { align-items: flex-start; justify-content: flex-end; } /* right drawer */
      .drawer {
        width: 380px; height: 100vh; max-height: 100vh;
        border-radius: 0; border-top: none; border-left: 1px solid var(--border);
      }
      .drawer-handle { display: none; }
    }

    .drawer-head { display: flex; align-items: center; justify-content: space-between; }
    .drawer-head h2 { font-size: 1rem; font-weight: 600; }

    .section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
      padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
    }

    /* ── Form fields ──────────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
    .field input[type="text"], .field input[type="number"],
    .field input[type="password"], .field select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 0.55rem 0.75rem; font-size: 0.875rem; font-family: inherit; width: 100%;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .hint { font-size: 0.72rem; color: var(--muted); }
    .check-row { flex-direction: row; align-items: center; gap: 0.6rem; }
    .check-row label { color: var(--text); font-size: 0.875rem; font-weight: normal; }
    input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; }

    .storage-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .storage-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    .storage-fill.warn { background: var(--red); }
    .storage-info { font-size: 0.78rem; color: var(--muted); }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.55rem 1.1rem; border-radius: 8px;
      font-size: 0.875rem; font-family: inherit; font-weight: 500;
      cursor: pointer; border: none; transition: background .15s, opacity .15s;
      min-height: 44px; white-space: nowrap;
    }
    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }
    .btn-danger { background: rgba(220,38,38,.08); color: var(--red); border: 1px solid rgba(220,38,38,.2); }
    .btn-danger:hover { background: rgba(220,38,38,.14); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; min-height: 36px; }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    main {
      flex: 1; padding: 1rem;
      max-width: 800px; margin: 0 auto; width: 100%;
      display: flex; flex-direction: column; gap: 1rem;
    }

    /* ── Panel ────────────────────────────────────────────────────────────── */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .panel-head {
      padding: 0.875rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.75rem; flex-wrap: wrap;
    }
    .panel-title { font-weight: 600; font-size: 0.9rem; }
    .panel-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .panel-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    /* ── Notices ──────────────────────────────────────────────────────────── */
    .notice {
      padding: 0.75rem 1rem; font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
    }
    .notice > span { flex: 1; }
    .notice.warn   { background: rgba(217,119,6,.06);  border-bottom: 1px solid rgba(217,119,6,.2);  color: var(--yellow); }
    .notice.info   { background: rgba(37,99,235,.06);  border-bottom: 1px solid rgba(37,99,235,.2);  color: var(--accent); }
    .notice.danger { background: rgba(220,38,38,.06);  border-bottom: 1px solid rgba(220,38,38,.2);  color: var(--red); }
    .inline-notice { border-radius: var(--r); border: 1px solid; }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .empty {
      padding: 3rem 1.5rem; text-align: center;
      color: var(--muted); font-size: 0.875rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    }
    .empty svg { opacity: .2; }

    /* ── File list ────────────────────────────────────────────────────────── */
    .file-item {
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1rem; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .file-item:last-child { border-bottom: none; }

    .file-row { display: flex; align-items: flex-start; gap: 0.6rem; }
    .file-check { flex-shrink: 0; accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; margin-top: 4px; }
    .file-info  { flex: 1; min-width: 0; }
    .file-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .card-title { font-size: 0.9rem; font-weight: 600; }
    .file-name  { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 0.1rem; }
    .file-meta  { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

    .badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.5rem;
      border-radius: 100px; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
    }
    .badge-pending     { background: var(--surface2); color: var(--muted); }
    .badge-converting  { background: rgba(37,99,235,.1); color: var(--accent); }
    .badge-transcribing{ background: rgba(37,99,235,.1); color: var(--accent); }
    .badge-done        { background: rgba(5,150,105,.1); color: var(--green); }
    .badge-error       { background: rgba(220,38,38,.1); color: var(--red); }
    .badge-deleted     { background: var(--surface2); color: var(--muted); }

    .progress-bar  { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 1px;
      animation: indeterminate 1.4s ease infinite; transform-origin: left;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%) scaleX(.4); }
      50%  { transform: translateX(60%)  scaleX(.8); }
      100% { transform: translateX(200%) scaleX(.4); }
    }

    .transcript {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem 1rem; font-size: 0.875rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .tx-actions { display: flex; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }

    .notes-area {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem; font-size: 0.875rem; font-family: inherit;
      color: var(--text); resize: vertical; line-height: 1.5;
    }
    .notes-area:focus { outline: none; border-color: var(--accent); }
    .notes-footer { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .notes-view {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1rem; font-size: 0.875rem; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word; color: var(--muted);
    }

    .error-msg {
      font-size: 0.8rem; color: var(--red);
      background: rgba(220,38,38,.06); border: 1px solid rgba(220,38,38,.15);
      border-radius: 8px; padding: 0.6rem 0.875rem;
      display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap;
    }
    .error-msg span { flex: 1; }

    /* ── Model download ───────────────────────────────────────────────────── */
    .download-progress {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .download-bar  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .download-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
    .download-label { font-size: 0.8rem; color: var(--muted); }

    /* ── Sticky action bar ────────────────────────────────────────────────── */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .action-bar .btn-primary { flex: 1; }

    @media (min-width: 640px) {
      .action-bar {
        left: 50%; transform: translateX(-50%);
        max-width: 800px;
        border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10/hooks';
import { signal, batch } from 'https://esm.sh/@preact/signals@1?deps=preact@10';
import htm from 'https://esm.sh/htm@3?deps=preact@10';
import { fromHub } from 'https://esm.sh/parakeet.js@1.4.4';

const html = htm.bind(h);

// ══════════════════════════════════════════════════════════════════════════════
// COMPAT CHECKS
// ══════════════════════════════════════════════════════════════════════════════

const hasFilePicker = 'showDirectoryPicker' in window;
const hasWebGPU     = 'gpu' in navigator;
// WebAssembly SIMD is required by the WASM backend of parakeet.js
const hasSimd = typeof WebAssembly !== 'undefined' && WebAssembly.validate(new Uint8Array([
  0,97,115,109,1,0,0,0,1,5,1,96,0,1,123,3,2,1,0,10,10,1,8,0,65,0,253,15,253,98,11
]));

// ══════════════════════════════════════════════════════════════════════════════
// PURE HELPERS
// ══════════════════════════════════════════════════════════════════════════════

const TX_PREFIX = 'transcription:';
const TX_INDEX  = 'transcription:index';

const fmtBytes     = b => b < 1048576 ? `${(b/1024).toFixed(0)} KB` : b < 1073741824 ? `${(b/1048576).toFixed(1)} MB` : `${(b/1073741824).toFixed(1)} GB`;
const fmtDur       = b => { const m = b / (17*1048576); return m < 1 ? `~${Math.round(m*60)}s` : `~${m.toFixed(1)} min`; };
const fmtDate      = ts => new Date(ts).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
const fmtCardTitle = ts => { const d = new Date(ts); return `${d.toLocaleDateString(undefined, { weekday: 'long' })} · ${d.toLocaleTimeString(undefined, { timeStyle: 'short' })}`; };
const genId        = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&3|8)).toString(16); });

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════

const DEFAULTS = {
  language: 'en',
  vad_enabled: true,
  vad_threshold: 0.01,
  vad_padding_ms: 200,
  vad_min_silence_ms: 300,
  delete_after_transcription: false,
  auto_save: true,
  notion_api_key: '',
  notion_target_id: '',
  obsidian_vault_name: '',
};

// ══════════════════════════════════════════════════════════════════════════════
// SIGNALS
// ══════════════════════════════════════════════════════════════════════════════

const cfg             = signal((() => { try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem('tj_cfg') || '{}') }; } catch { return { ...DEFAULTS }; } })());
const files           = signal([]);
const dirHandle       = signal(null);
const busy            = signal(false);
const settingsOpen    = signal(false);
const modelStatus     = signal({ dot: 'missing', label: 'Model not downloaded' });
const modelPanelVis   = signal(false);
const simdErrorVis    = signal(false);
const dlProgress      = signal({ visible: false, pct: 0, label: '' });
const webgpuNoticeVis = signal(!hasWebGPU);
const deleteBannerVis = signal(false);
const historyEntries  = signal([]);
const storageInfo     = signal({ pct: 0, text: 'Calculating…', warn: false });

// ══════════════════════════════════════════════════════════════════════════════
// STORAGE / HISTORY (localStorage)
// ══════════════════════════════════════════════════════════════════════════════

function getIndex() {
  try { return JSON.parse(localStorage.getItem(TX_INDEX) || '[]'); }
  catch { return []; }
}
function saveTx(entry) {
  const idx = getIndex(); idx.unshift(entry.id);
  localStorage.setItem(TX_INDEX, JSON.stringify(idx));
  localStorage.setItem(`${TX_PREFIX}${entry.id}`, JSON.stringify(entry));
}
function getTx(id) {
  try { return JSON.parse(localStorage.getItem(`${TX_PREFIX}${id}`) || 'null'); }
  catch { return null; }
}
function updateTx(id, patch) {
  const entry = getTx(id); if (!entry) return;
  localStorage.setItem(`${TX_PREFIX}${id}`, JSON.stringify({ ...entry, ...patch }));
}
function removeTx(id) {
  localStorage.setItem(TX_INDEX, JSON.stringify(getIndex().filter(x => x !== id)));
  localStorage.removeItem(`${TX_PREFIX}${id}`);
}
function allTx()            { return getIndex().map(id => getTx(id)).filter(Boolean); }
function getTxByFilename(n) { return allTx().find(e => e.filename === n) || null; }

function refreshHistory() { historyEntries.value = allTx(); }

async function refreshStorage() {
  let used = 0, total = 5 * 1024 * 1024;
  if (navigator.storage?.estimate) {
    try { ({ usage: used, quota: total } = await navigator.storage.estimate()); } catch {}
  } else {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      used += (k.length + (localStorage.getItem(k) || '').length) * 2;
    }
  }
  const pct = Math.min(100, (used / total) * 100);
  storageInfo.value = { pct, warn: pct > 80, text: `${fmtBytes(used)} used of ~${fmtBytes(total)}${pct > 80 ? ' — running low' : ''}` };
}

async function clearHistory() {
  if (!confirm('Delete all saved transcriptions? Source audio files are not affected.')) return;
  getIndex().forEach(id => localStorage.removeItem(`${TX_PREFIX}${id}`));
  localStorage.removeItem(TX_INDEX);
  refreshHistory(); refreshStorage();
}

// ══════════════════════════════════════════════════════════════════════════════
// PARAKEET.JS
// ══════════════════════════════════════════════════════════════════════════════

const MODEL_KEY = 'parakeet-tdt-0.6b-v3';
let parakeetModel = null;

async function loadParakeet(onProgress) {
  parakeetModel = await fromHub(MODEL_KEY, {
    backend:             hasWebGPU ? 'webgpu' : 'wasm',
    encoderQuant:        'fp32',   // int8 silently forced to fp32 for WebGPU anyway
    decoderQuant:        'int8',
    preprocessorBackend: 'js',
    ...(onProgress ? { progress: onProgress } : {}),
  });
  localStorage.setItem('parakeet_model_ready', 'true');
}

async function runParakeet(float32) {
  if (!parakeetModel) throw new Error('Model not loaded — download the model first.');
  const result = await parakeetModel.transcribeLongAudio(float32, 16000, { returnTimestamps: false });
  return result.text;
}

// ══════════════════════════════════════════════════════════════════════════════
// MODEL MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════════

async function checkModelStatus() {
  if (!hasSimd) {
    modelStatus.value   = { dot: 'missing', label: 'Not supported' };
    modelPanelVis.value = true;
    simdErrorVis.value  = true;
    return;
  }
  if (localStorage.getItem('parakeet_model_ready') === 'true') {
    modelStatus.value   = { dot: 'loading', label: 'Loading model…' };
    modelPanelVis.value = false;
    try {
      await loadParakeet();
      modelStatus.value = { dot: 'cached', label: 'Model ready' };
    } catch {
      localStorage.removeItem('parakeet_model_ready');
      modelStatus.value   = { dot: 'missing', label: 'Model not downloaded' };
      modelPanelVis.value = true;
    }
  } else {
    modelStatus.value   = { dot: 'missing', label: 'Model not downloaded' };
    modelPanelVis.value = true;
  }
}

async function downloadModel() {
  dlProgress.value  = { visible: true, pct: 0, label: 'Starting download…' };
  modelStatus.value = { dot: 'loading', label: 'Downloading…' };
  try {
    await loadParakeet(p => {
      if (!p) return;
      const pct = typeof p === 'number' ? p : p.progress != null ? p.progress : (p.loaded && p.total) ? (p.loaded / p.total * 100) : null;
      dlProgress.value = {
        visible: true,
        pct:   pct != null ? Math.min(99, pct) : dlProgress.value.pct,
        label: p.file ? `Downloading ${p.file}…` : p.status === 'loading' ? 'Loading model into memory…' : dlProgress.value.label,
      };
    });
    dlProgress.value  = { visible: true, pct: 100, label: 'Done' };
    modelStatus.value = { dot: 'cached', label: 'Model ready' };
    modelPanelVis.value = false;
  } catch (e) {
    dlProgress.value  = { ...dlProgress.value, label: `Failed: ${e.message}` };
    modelStatus.value = { dot: 'missing', label: 'Download failed' };
    console.error('Model load failed:', e);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// AUDIO PIPELINE
// Returns Float32Array (mono 16 kHz) ready for parakeet.js directly.
// ══════════════════════════════════════════════════════════════════════════════

async function prepareAudio(arrayBuffer) {
  const audioCtx    = new AudioContext();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
  await audioCtx.close();
  const targetRate = 16000;
  const numFrames  = Math.ceil(audioBuffer.duration * targetRate);
  const offCtx     = new OfflineAudioContext(1, numFrames, targetRate);
  const src        = offCtx.createBufferSource();
  src.buffer = audioBuffer; src.connect(offCtx.destination); src.start();
  const rendered = await offCtx.startRendering();
  let float32 = rendered.getChannelData(0);
  if (cfg.value.vad_enabled) float32 = removeSilence(float32, targetRate);
  return float32;
}

function removeSilence(float32, sampleRate) {
  const c = cfg.value;
  const chunkMs      = 20;
  const chunkSize    = Math.floor(sampleRate * chunkMs / 1000);
  const padChunks    = Math.ceil(c.vad_padding_ms / chunkMs);
  const minSilChunks = Math.ceil(c.vad_min_silence_ms / chunkMs);
  const threshold    = c.vad_threshold;

  const voiced = [];
  for (let i = 0; i < float32.length; i += chunkSize) {
    const chunk = float32.subarray(i, i + chunkSize);
    const rms   = Math.sqrt(chunk.reduce((s, x) => s + x * x, 0) / chunk.length);
    voiced.push(rms >= threshold);
  }
  const padded = voiced.slice();
  for (let i = 0; i < voiced.length; i++) {
    if (voiced[i]) {
      const lo = Math.max(0, i - padChunks), hi = Math.min(voiced.length, i + padChunks + 1);
      for (let j = lo; j < hi; j++) padded[j] = true;
    }
  }
  let run = 0;
  for (let i = 0; i <= padded.length; i++) {
    if (i < padded.length && !padded[i]) { run++; }
    else { if (run > 0 && run < minSilChunks) for (let j = i - run; j < i; j++) padded[j] = true; run = 0; }
  }
  const parts = [];
  for (let i = 0; i < padded.length; i++) if (padded[i]) parts.push(float32.subarray(i * chunkSize, Math.min((i+1)*chunkSize, float32.length)));
  if (!parts.length) return float32;
  const out = new Float32Array(parts.reduce((s, c) => s + c.length, 0));
  let off = 0; for (const p of parts) { out.set(p, off); off += p.length; }
  return out;
}

// DRIVE PICKER
// ══════════════════════════════════════════════════════════════════════════════

function updateFile(i, patch) {
  files.value = files.value.map((f, idx) => idx === i ? { ...f, ...patch } : f);
}

async function pickDrive() {
  try {
    const mode   = cfg.value.delete_after_transcription ? 'readwrite' : 'read';
    const handle = await window.showDirectoryPicker({ mode });
    const found  = [];
    await scan(handle, '', found);
    found.sort((a, b) => a.path.localeCompare(b.path));
    batch(() => { dirHandle.value = handle; files.value = found; });
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function scan(handle, prefix, found) {
  for await (const [name, entry] of handle.entries()) {
    const path = prefix ? `${prefix}/${name}` : name;
    if (entry.kind === 'file' && name.toLowerCase().endsWith('.wav')) {
      const file     = await entry.getFile();
      const existing = getTxByFilename(name);
      found.push({
        handle: entry, name, path, size: file.size, mtime: file.lastModified,
        selected:   !existing,
        status:     existing ? 'done'               : 'pending',
        transcript: existing ? existing.text        : null,
        savedId:    existing ? existing.id          : null,
        deleted:    existing ? (existing.deleted ?? false) : false,
        notes:      existing ? (existing.notes || '') : '',
        error: null,
      });
    } else if (entry.kind === 'directory') {
      await scan(entry, path, found);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TRANSCRIPTION FLOW
// ══════════════════════════════════════════════════════════════════════════════

function requestBatch() {
  if (busy.value) return;
  if (cfg.value.delete_after_transcription) { deleteBannerVis.value = true; }
  else startBatch();
}

async function startBatch() {
  if (busy.value) return;
  busy.value = true;
  for (let i = 0; i < files.value.length; i++) {
    const f = files.value[i];
    if (!f.selected || f.status === 'done') continue;
    await transcribeFile(i);
  }
  busy.value = false;
  refreshHistory();
}

async function transcribeFile(i) {
  updateFile(i, { status: 'converting', error: null });
  try {
    const raw    = await files.value[i].handle.getFile();
    let float32  = await prepareAudio(await raw.arrayBuffer());

    updateFile(i, { status: 'transcribing' });

    const text = await runParakeet(float32);
    float32 = null; // release ~100 MB+ audio buffer

    if (!text?.trim()) throw new Error('Transcription returned an empty result');

    const transcript = text.trim();
    updateFile(i, { transcript, status: 'done' });

    let savedId = files.value[i].savedId;

    // Persist — must succeed before deletion is allowed
    if (cfg.value.auto_save) {
      const entry = {
        id:              genId(),
        filename:        files.value[i].name,
        transcribedAt:   new Date().toISOString(),
        durationSeconds: Math.round(files.value[i].size / (17 * 1024 * 1024) * 60),
        text:            transcript,
        silenceRemoved:  cfg.value.vad_enabled,
        deleted:         false,
        notes:           '',
      };
      saveTx(entry);
      savedId = entry.id;
      updateFile(i, { savedId });
      refreshStorage();
    }

    // Per-file deletion — only after localStorage confirmed
    if (cfg.value.delete_after_transcription && savedId) {
      try {
        await files.value[i].handle.remove();
        updateFile(i, { deleted: true });
        updateTx(savedId, { deleted: true });
      } catch (e) { console.warn('Could not delete', files.value[i].name, e); }
    }

    updateFile(i, { handle: null }); // release file handle
  } catch (e) {
    updateFile(i, { error: e.message, status: 'error' });
  }
}

async function retryFile(i) {
  if (busy.value) return;
  busy.value = true;
  await transcribeFile(i);
  busy.value = false;
  refreshHistory();
}

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); }
  catch { prompt('Copy the text below:', text); }
}

async function shareOne(i) {
  const f = files.value[i]; if (!f?.transcript) return;
  try { await navigator.share({ title: f.name, text: f.transcript }); }
  catch { copyToClipboard(f.transcript); }
}

async function shareAll() {
  const done = files.value.filter(f => f.transcript !== null); if (!done.length) return;
  const text = done.map(f => `${f.path}\n\n${f.transcript}`).join('\n\n---\n\n');
  try { await navigator.share({ title: 'Transcriptions', text }); }
  catch { copyToClipboard(text); }
}

function exportAll(fmt) {
  const done = files.value.filter(f => f.transcript !== null); if (!done.length) return;
  const sep  = '\n\n---\n\n';
  const content = fmt === 'txt'
    ? done.map(f => `${f.path}\n\n${f.transcript}`).join(sep)
    : done.map(f => `## ${f.path}\n\n${f.transcript}`).join(sep);
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], { type: 'text/plain' })),
    download: `transcriptions.${fmt}`,
  });
  a.click(); URL.revokeObjectURL(a.href);
}

async function sendToNotion(i) {
  const f = files.value[i]; if (!f?.transcript) return;
  try {
    const res = await fetch(`https://api.notion.com/v1/blocks/${cfg.value.notion_target_id}/children`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${cfg.value.notion_api_key}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ children: [
        { type: 'heading_2', heading_2: { rich_text: [{ type: 'text', text: { content: f.name } }] } },
        { type: 'paragraph', paragraph: { rich_text: [{ type: 'text', text: { content: f.transcript } }] } },
      ] }),
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || `HTTP ${res.status}`); }
    alert('Sent to Notion.');
  } catch (e) {
    alert(`Notion export failed: ${e.message}\n\nNote: Notion's API may block browser-direct requests due to CORS restrictions.`);
  }
}

function sendToObsidian(i) {
  const f = files.value[i]; if (!f?.transcript || !cfg.value.obsidian_vault_name) return;
  const name = f.name.replace(/\.wav$/i, '');
  window.open(`obsidian://new?vault=${encodeURIComponent(cfg.value.obsidian_vault_name)}&name=${encodeURIComponent(name)}&content=${encodeURIComponent(f.transcript)}`);
}

const BADGE_MAP = {
  pending:      ['badge-pending',      'Pending'],
  converting:   ['badge-converting',   'Converting'],
  transcribing: ['badge-transcribing', 'Transcribing'],
  done:         ['badge-done',         'Done'],
  error:        ['badge-error',        'Error'],
};

function FileItem({ f, i }) {
  const [notesOpen,  setNotesOpen]  = useState(false);
  const [notesSaved, setNotesSaved] = useState(false);
  const [notesDraft, setNotesDraft] = useState(f.notes || '');
  const [recording,  setRecording]  = useState(false);
  const [micBusy,    setMicBusy]    = useState(false);
  const mediaRecRef = useRef(null);
  const chunksRef   = useRef([]);

  const [bc, bl]   = BADGE_MAP[f.status] || BADGE_MAP.pending;
  const inProgress = f.status === 'converting' || f.status === 'transcribing';
  const isBusy     = busy.value;
  const c          = cfg.value;

  const persistNotes = text => {
    updateFile(i, { notes: text });
    if (f.savedId) updateTx(f.savedId, { notes: text });
  };

  const handleSave = () => { persistNotes(notesDraft); setNotesSaved(true); };

  const toggleNotes = () => {
    if (!notesOpen) { setNotesSaved(!!notesDraft); setNotesOpen(true); }
    else setNotesOpen(false);
  };

  const toggleRecording = async () => {
    if (recording) {
      mediaRecRef.current?.stop();
      setRecording(false);
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunksRef.current = [];
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setMicBusy(true);
        try {
          const blob  = new Blob(chunksRef.current, { type: mr.mimeType });
          const ab    = await blob.arrayBuffer();
          const f32   = await prepareAudio(ab);
          const text  = await runParakeet(f32);
          if (text?.trim()) {
            const next = notesDraft ? `${notesDraft} ${text.trim()}` : text.trim();
            setNotesDraft(next);
            persistNotes(next);
          }
        } catch (e) { console.error('Mic transcription failed:', e); }
        setMicBusy(false);
      };
      mr.start();
      mediaRecRef.current = mr;
      setRecording(true);
    } catch (e) { console.error('Mic access denied:', e); }
  };

  const onDelete = () => {
    if (!confirm('Remove this transcription? The source file is not affected.')) return;
    if (f.savedId) removeTx(f.savedId);
    if (f.deleted) {
      files.value = files.value.filter((_, idx) => idx !== i);
    } else {
      updateFile(i, { transcript: null, status: 'pending', savedId: null, notes: '' });
      setNotesDraft(''); setNotesOpen(false);
    }
    refreshHistory(); refreshStorage();
  };

  return html`
    <div class="file-item">
      <div class="file-row">
        <input type="checkbox" class="file-check" checked=${f.selected} disabled=${isBusy}
          onChange=${e => updateFile(i, { selected: e.target.checked })} />
        <div class="file-info">
          <div class="file-header">
            <div class="card-title">${fmtCardTitle(f.mtime)}</div>
            <span class=${'badge ' + bc}>${bl}</span>
          </div>
          <div class="file-name" title=${f.path}>${f.path}</div>
          <div class="file-meta">${fmtBytes(f.size)} · ${fmtDur(f.size)}</div>
        </div>
      </div>
      ${inProgress && html`<div class="progress-bar"><div class="progress-fill"></div></div>`}
      ${f.transcript !== null && html`
        <div class="transcript">${f.transcript}</div>
        <div class="tx-actions">
          <button class="btn btn-ghost btn-sm" onClick=${() => copyToClipboard(f.transcript)}>Copy</button>
          ${navigator.share && html`<button class="btn btn-ghost btn-sm" onClick=${() => shareOne(i)}>Share</button>`}
          ${c.notion_api_key && c.notion_target_id && html`<button class="btn btn-ghost btn-sm" onClick=${() => sendToNotion(i)}>Notion</button>`}
          ${c.obsidian_vault_name && html`<button class="btn btn-ghost btn-sm" onClick=${() => sendToObsidian(i)}>Obsidian</button>`}
          <button class="btn btn-ghost btn-sm" onClick=${toggleNotes}>Notes</button>
          <button class="btn btn-danger btn-sm" onClick=${onDelete}>Delete</button>
        </div>
      `}
      ${notesOpen && (notesSaved ? html`
        <div class="notes-view">${notesDraft}</div>
        <div class="notes-footer">
          <button class="btn btn-ghost btn-sm" onClick=${() => setNotesSaved(false)}>Edit</button>
        </div>
      ` : html`
        <textarea class="notes-area" placeholder="Add notes…" rows="3"
          value=${notesDraft}
          onInput=${e => setNotesDraft(e.target.value)}
        ></textarea>
        <div class="notes-footer">
          <button class="btn btn-primary btn-sm" onClick=${handleSave}>Save</button>
          <button class="btn btn-ghost btn-sm" data-mic
            disabled=${!parakeetModel || micBusy}
            title=${!parakeetModel ? 'Model not loaded' : recording ? 'Stop recording' : 'Record a voice note'}
            onClick=${toggleRecording}>
            ${micBusy ? html`Transcribing…` : recording
              ? html`<${IconMicActive} /> Stop`
              : html`<${IconMic} /> Transcribe`}
          </button>
        </div>
      `)}
      ${f.error && html`
        <div class="error-msg">
          <span>${f.error}</span>
          <button class="btn btn-ghost btn-sm" onClick=${() => retryFile(i)}>Retry</button>
        </div>
      `}
    </div>`;
}

function SettingsDrawer() {
  const open = settingsOpen.value;
  const c    = cfg.value;

  const [lang,      setLang]      = useState(c.language);
  const [vadOn,     setVadOn]     = useState(c.vad_enabled);
  const [thresh,    setThresh]    = useState(c.vad_threshold);
  const [pad,       setPad]       = useState(c.vad_padding_ms);
  const [silGap,    setSilGap]    = useState(c.vad_min_silence_ms);
  const [autoSave,  setAutoSave]  = useState(c.auto_save);
  const [delAfter,  setDelAfter]  = useState(c.delete_after_transcription);
  const [notionKey, setNotionKey] = useState(c.notion_api_key);
  const [notionId,  setNotionId]  = useState(c.notion_target_id);
  const [obsidian,  setObsidian]  = useState(c.obsidian_vault_name);
  const si = storageInfo.value;

  // Reset draft when drawer opens
  useEffect(() => {
    if (!open) return;
    const c = cfg.value;
    setLang(c.language); setVadOn(c.vad_enabled); setThresh(c.vad_threshold);
    setPad(c.vad_padding_ms); setSilGap(c.vad_min_silence_ms); setAutoSave(c.auto_save);
    setDelAfter(c.delete_after_transcription); setNotionKey(c.notion_api_key);
    setNotionId(c.notion_target_id); setObsidian(c.obsidian_vault_name);
  }, [open]);

  const save = () => {
    const prevDelete = cfg.value.delete_after_transcription;
    const newCfg = {
      language: lang,
      vad_enabled:                vadOn,
      vad_threshold:              parseFloat(thresh)  || DEFAULTS.vad_threshold,
      vad_padding_ms:             parseInt(pad)       || DEFAULTS.vad_padding_ms,
      vad_min_silence_ms:         parseInt(silGap)    || DEFAULTS.vad_min_silence_ms,
      auto_save:                  autoSave,
      delete_after_transcription: delAfter,
      notion_api_key:             notionKey,
      notion_target_id:           notionId,
      obsidian_vault_name:        obsidian,
    };
    if (!prevDelete && delAfter) {
      alert('Delete after transcription enabled.\n\nSource WAV files will be permanently deleted from your DJI drive after each successful transcription. Ensure the drive is not your only copy of these recordings.');
    }
    cfg.value = newCfg;
    localStorage.setItem('tj_cfg', JSON.stringify(newCfg));
    settingsOpen.value = false;
  };

  if (!open) return null;
  return html`
    <div class="overlay open" onClick=${e => { if (e.target === e.currentTarget) settingsOpen.value = false; }}>
      <div class="drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-head">
          <h2>Settings</h2>
          <button class="icon-btn" aria-label="Close settings" onClick=${() => settingsOpen.value = false}><${IconX} /></button>
        </div>

        <div class="section-label">Transcription</div>
        <div class="field">
          <label>Language</label>
          <input type="text" placeholder="en" maxlength="10" value=${lang} onInput=${e => setLang(e.target.value)} />
          <span class="hint">ISO 639-1 code (en, sv, fr…). Leave blank to auto-detect.</span>
        </div>

        <div class="section-label">Silence Removal (VAD)</div>
        <div class="field check-row">
          <input type="checkbox" checked=${vadOn} onChange=${e => setVadOn(e.target.checked)} />
          <label>Remove silent sections before transcription</label>
        </div>
        <div style=${'opacity:' + (vadOn ? '1' : '.4')}>
          <div class="field" style="margin-top:.6rem">
            <label>RMS Threshold</label>
            <input type="number" step="0.001" min="0" max="1" placeholder="0.01" disabled=${!vadOn} value=${thresh} onInput=${e => setThresh(e.target.value)} />
            <span class="hint">Energy below this level is treated as silence</span>
          </div>
          <div class="field" style="margin-top:.6rem">
            <label>Padding (ms)</label>
            <input type="number" step="10" min="0" placeholder="200" disabled=${!vadOn} value=${pad} onInput=${e => setPad(e.target.value)} />
            <span class="hint">Audio retained around voiced regions</span>
          </div>
          <div class="field" style="margin-top:.6rem">
            <label>Min silence gap (ms)</label>
            <input type="number" step="10" min="0" placeholder="300" disabled=${!vadOn} value=${silGap} onInput=${e => setSilGap(e.target.value)} />
            <span class="hint">Minimum gap before it is removed</span>
          </div>
        </div>

        <div class="section-label">Storage</div>
        <div class="field check-row">
          <input type="checkbox" checked=${autoSave} onChange=${e => setAutoSave(e.target.checked)} />
          <label>Auto-save transcriptions to history</label>
        </div>
        <div style="display:flex;flex-direction:column;gap:.4rem">
          <div class="storage-bar"><div class=${'storage-fill' + (si.warn ? ' warn' : '')} style=${'width:' + si.pct + '%'}></div></div>
          <div class="storage-info">${si.text}</div>
          <button class="btn btn-danger btn-sm" style="align-self:flex-start" onClick=${clearHistory}>Clear History</button>
        </div>

        <div class="section-label">Drive</div>
        <div class="field check-row">
          <input type="checkbox" checked=${delAfter} onChange=${e => setDelAfter(e.target.checked)} />
          <label>Delete source files after transcription</label>
        </div>
        <p class="hint">Files are deleted per-file immediately after transcription succeeds and is saved to history. You will be asked to confirm before each batch.</p>

        <div class="section-label">Connectors — Notion</div>
        <div class="field">
          <label>Integration Token</label>
          <input type="password" placeholder="secret_…" value=${notionKey} onInput=${e => setNotionKey(e.target.value)} />
        </div>
        <div class="field">
          <label>Target Page or Database ID</label>
          <input type="text" placeholder="32-character ID" value=${notionId} onInput=${e => setNotionId(e.target.value)} />
        </div>

        <div class="section-label">Connectors — Obsidian</div>
        <div class="field">
          <label>Vault Name</label>
          <input type="text" placeholder="My Vault" value=${obsidian} onInput=${e => setObsidian(e.target.value)} />
          <span class="hint">Opens a new note via obsidian:// URI. Obsidian must be running locally.</span>
        </div>

        <div class="section-label">Connectors — Coming Soon</div>
        <p class="hint" style="padding-bottom:.25rem">Claude · ChatGPT · Custom Webhook</p>

        <button class="btn btn-primary" onClick=${save}>Save Settings</button>
      </div>
    </div>`;
}

function App() {
  useEffect(() => {
    checkModelStatus();
    refreshHistory();
    refreshStorage();
  }, []);

  return html`
    <div id="app" style="display:flex;flex-direction:column">
      <${SettingsDrawer} />
      <${Header} />
      <main>
        <${ModelPanel} />
        ${webgpuNoticeVis.value && html`
          <div class="notice warn inline-notice">
            <span>WebGPU not available — using WASM mode (~650 MB). Transcription will work but may be slower than with a GPU.</span>
          </div>
        `}
        <${FilesPanel} />
      </main>
      <${ActionBar} />
    </div>`;
}

function CompatWarning() {
  return html`
    <div id="compat-warning" style="display:flex">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--yellow)">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <h1>Chromium-based browser required</h1>
      <p>This app uses the File System Access API, which is only supported in Chrome, Edge, and Brave. Please open this page in one of those browsers.</p>
    </div>`;
}

// Test hooks — used by tests/notes-features.test.js
window._tj = { files, cfg, busy, historyEntries, get parakeetModel() { return parakeetModel; }, set parakeetModel(v) { parakeetModel = v; } };

render(hasFilePicker ? html`<${App} />` : html`<${CompatWarning} />`, document.getElementById('root'));
</script>
</body>
</html>
